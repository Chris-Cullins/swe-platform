syntax = "proto3";

package sandboxd.v1;

option go_package = "github.com/Chris-Cullins/swe-platform/sandboxd/gen/proto/sandboxd/v1;sandboxdv1";

// ExecService runs commands inside the environment and streams output.
service ExecService {
  // Exec starts a command on the first message, then streams stdin.
  // The server streams stdout/stderr chunks and a single terminal exit message.
  rpc Exec(stream ExecRequest) returns (stream ExecResponse);
}

message ExecRequest {
  oneof kind {
    ExecStart start = 1;
    bytes stdin = 2;
    ExecStdinEOF stdin_eof = 3;
    ExecControl control = 4;
  }
}

message ExecStdinEOF {}

enum ProcessControl {
  PROCESS_CONTROL_UNSPECIFIED = 0;
  PROCESS_CONTROL_INTERRUPT = 1;
  PROCESS_CONTROL_TERMINATE = 2;
  PROCESS_CONTROL_FORCE = 3;
}

message ExecControl { ProcessControl control = 1; }

enum EnvironmentMode {
  ENVIRONMENT_MODE_UNSPECIFIED = 0;
  ENVIRONMENT_MODE_INHERIT = 1;
  ENVIRONMENT_MODE_REPLACE = 2;
}

enum TerminationReason {
  TERMINATION_REASON_UNSPECIFIED = 0;
  TERMINATION_REASON_EXITED = 1;
  TERMINATION_REASON_START_FAILED = 2;
  TERMINATION_REASON_WAIT_FAILED = 3;
  TERMINATION_REASON_TIMEOUT = 4;
  TERMINATION_REASON_INTERRUPTED = 5;
  TERMINATION_REASON_TERMINATED = 6;
  TERMINATION_REASON_FORCED = 7;
  TERMINATION_REASON_DISCONNECTED = 8;
  TERMINATION_REASON_DAEMON_CLOSED = 9;
}

enum OutputStream {
  OUTPUT_STREAM_UNSPECIFIED = 0;
  OUTPUT_STREAM_STDOUT = 1;
  OUTPUT_STREAM_STDERR = 2;
}

message OutputChunk {
  OutputStream stream = 1;
  bytes data = 2;
  uint64 offset = 3;
  uint64 gap_bytes = 4;
}

message ExecStart {
  // argv is the command and its arguments; argv[0] is the program.
  // No shell is implied — shell behavior requires argv = {"sh", "-c", ...}.
  repeated string argv = 1;
  // cwd defaults to the environment workspace.
  string cwd = 2;
  map<string, string> env = 3;
  EnvironmentMode env_mode = 4;
  uint64 timeout_ms = 5;
}

message ExecResponse {
  oneof kind {
    // Field numbers 1 and 2 were bytes before lifecycle v1. Their wire type is
    // intentionally incompatible; pre-1.0 clients must regenerate.
    OutputChunk stdout = 1;
    OutputChunk stderr = 2;
    ExecExit exit = 3;
  }
}

message ExecExit {
  int32 code = 1;
  // error is set when the command could not be started or waited on.
  string error = 2;
  TerminationReason reason = 3;
}

// ProcessService manages background processes for the lifetime of one
// sandboxd daemon epoch. Processes are addressed by their logical owner and
// role, never by an operating-system process identifier.
service ProcessService {
  // Start is detached from the RPC context. Repeating the same key and spec
  // returns the existing process; the same key with a different spec fails.
  rpc Start(StartProcessRequest) returns (Process);
  // StartWithLaunchMaterial supplies write-only data used only to construct the
  // child environment. It is never retained in or returned by a Process.
  rpc StartWithLaunchMaterial(StartProcessWithLaunchMaterialRequest) returns (Process);
  // Get returns running and retained terminal state in this sandboxd epoch.
  rpc Get(GetProcessRequest) returns (Process);
  // Stop is idempotent, including when the key is absent or already terminal.
  rpc Stop(StopProcessRequest) returns (Process);
  rpc ReadOutput(ReadOutputRequest) returns (ReadOutputResponse);
}

message ProcessKey {
  string owner_id = 1;
  string role = 2;
}

message ProcessSpec {
  repeated string argv = 1;
  // cwd defaults to the environment workspace.
  string cwd = 2;
  map<string, string> env = 3;
  EnvironmentMode env_mode = 4;
  uint64 timeout_ms = 5;
}

message StartProcessRequest {
  ProcessKey key = 1;
  ProcessSpec spec = 2;
}

message LaunchMaterial {
  // Values are bytes so this transport does not imply UTF-8 credentials.
  map<string, bytes> secret_env = 1;
}

message StartProcessWithLaunchMaterialRequest {
  ProcessKey key = 1;
  ProcessSpec spec = 2;
  LaunchMaterial launch_material = 3;
}

message GetProcessRequest {
  ProcessKey key = 1;
}

enum StopMode {
  STOP_MODE_UNSPECIFIED = 0;
  STOP_MODE_GRACEFUL = 1;
  STOP_MODE_FORCE = 2;
  STOP_MODE_INTERRUPT = 3;
  STOP_MODE_TERMINATE = 4;
}

message StopProcessRequest {
  ProcessKey key = 1;
  StopMode mode = 2;
  // Time allowed after a graceful request before force is used. Zero uses the
  // server default. Ignored for STOP_MODE_FORCE.
  uint32 grace_period_ms = 3;
}

enum ProcessState {
  PROCESS_STATE_UNSPECIFIED = 0;
  PROCESS_STATE_RUNNING = 1;
  PROCESS_STATE_STOPPING = 2;
  PROCESS_STATE_EXITED = 3;
  PROCESS_STATE_FAILED = 4;
}

message Process {
  ProcessKey key = 1;
  ProcessSpec spec = 2;
  ProcessState state = 3;
  // Present only after the child was started and reaped.
  optional int32 exit_code = 4;
  string error = 5;
  string execution_id = 6;
  TerminationReason reason = 7;
}

message ReadOutputRequest {
  ProcessKey key = 1;
  string execution_id = 2;
  OutputStream stream = 3;
  uint64 offset = 4;
  uint32 max_bytes = 5;
}

message ReadOutputResponse {
  bytes data = 1;
  uint64 offset = 2;
  uint64 next_offset = 3;
  uint64 gap_bytes = 4;
  bool eof = 5;
  // Absolute bounds make retention loss independently auditable.
  uint64 retained_start = 6;
  uint64 produced_end = 7;
}

// FilesystemService provides bounded access to the environment workspace.
// Paths are slash-separated logical paths, never host filesystem paths. See
// FILESYSTEM.md for normalization, confinement, limits, and commit semantics.
service FilesystemService {
  rpc Read(ReadRequest) returns (ReadResponse);
  rpc Write(stream WriteRequest) returns (WriteResponse);
  rpc List(ListRequest) returns (ListResponse);
}

message ReadRequest {
  string path = 1;
  uint64 offset = 2;
  uint32 max_bytes = 3;
  // include_version requests a complete-file SHA-256 scan. Clients normally
  // request it once, then page content without repeatedly hashing the file.
  bool include_version = 4;
}

message ReadResponse {
  bytes data = 1;
  uint64 offset = 2;
  uint64 next_offset = 3;
  uint64 size = 4;
  bool eof = 5;
  // version is the lowercase SHA-256 digest of the complete file when
  // include_version was requested; otherwise it is empty.
  string version = 6;
}

message WriteRequest {
  oneof kind {
    WriteHeader header = 1;
    bytes data = 2;
  }
}

enum WritePrecondition {
  WRITE_PRECONDITION_UNSPECIFIED = 0;
  WRITE_PRECONDITION_ANY = 1;
  WRITE_PRECONDITION_MUST_NOT_EXIST = 2;
  WRITE_PRECONDITION_MATCH_VERSION = 3;
}

message WriteHeader {
  string path = 1;
  WritePrecondition precondition = 2;
  // expected_version is required for MATCH_VERSION and is a lowercase
  // SHA-256 digest returned by Read or a prior Write.
  string expected_version = 3;
}

message WriteResponse {
  uint64 size = 1;
  string version = 2;
}

message ListRequest {
  string path = 1;
  uint32 page_size = 2;
  string page_token = 3;
}

message ListResponse {
  repeated Entry entries = 1;
  string next_page_token = 2;
}

enum EntryType {
  ENTRY_TYPE_UNSPECIFIED = 0;
  ENTRY_TYPE_FILE = 1;
  ENTRY_TYPE_DIRECTORY = 2;
  ENTRY_TYPE_SYMLINK = 3;
  ENTRY_TYPE_OTHER = 4;
}

message Entry {
  string name = 1;
  EntryType type = 2;
  // size is the regular-file byte size and zero for other entry types.
  uint64 size = 3;
  int64 modified_unix_ms = 4;
}

// TerminalService multiplexes the environment's shared terminal session.
// The agent and the human attach to the same session (tmux on Linux,
// ConPTY on Windows).
service TerminalService {
  rpc Terminal(stream TerminalMessage) returns (stream TerminalMessage);
}

message TerminalMessage {
  oneof kind {
    TerminalOpen open = 1;
    bytes data = 2;
    TerminalResize resize = 3;
  }
}

message TerminalOpen {
  uint32 cols = 1;
  uint32 rows = 2;
}

message TerminalResize {
  uint32 cols = 1;
  uint32 rows = 2;
}

// PortService tracks ports in use inside the environment so the gateway
// can expose them as portals.
service PortService {
  rpc Register(RegisterPortRequest) returns (Port);
  rpc List(ListPortsRequest) returns (ListPortsResponse);
}

message RegisterPortRequest {
  // port of 0 asks sandboxd to pick a free one.
  uint32 port = 1;
  string label = 2;
}

message Port {
  uint32 port = 1;
  string label = 2;
  // url is filled in once the gateway has exposed the port; empty until then.
  string url = 3;
}

message ListPortsRequest {}

message ListPortsResponse {
  repeated Port ports = 1;
}

// HealthService reports daemon liveness and version.
service HealthService {
  rpc Check(HealthCheckRequest) returns (HealthCheckResponse);
}

message HealthCheckRequest {}

message HealthCheckResponse {
  bool ok = 1;
  string version = 2;
}
