  - update
  - watch
- apiGroups:
  - swe.dev
  resources:
  - environments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - swe.dev
  resources:
  - environments/status
  - runs/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - swe.dev
  resources:
  - environmenttemplates
  - projects
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - swe.dev
  resources:
  - runs
  verbs:
  - delete
  - get
  - list
  - patch
  - update
  - watch
