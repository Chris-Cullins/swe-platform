# Production baseline for GKE clusters whose environment node pools have GKE
# Sandbox enabled. Images inherit the chart appVersion as one coordinated
# release. The gvisor RuntimeClass must exist before environments run.
replicaCount: 2

controlPlane:
  transcripts:
    postgresSecret:
      # Create this Secret out of band before installing the production preset.
      name: swe-platform-postgres

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: swe-platform

environmentTemplates:
  - name: medium
    spec:
      size: medium
      runtimeClass: gvisor
      idleTimeout: 15m
      diskSize: 40Gi
