# Production baseline for EKS with the EBS CSI driver and a default StorageClass.
# EKS has no standard gVisor RuntimeClass; configure one explicitly if installed.
replicaCount: 2

image:
  tag: latest

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: swe-platform

environmentTemplates:
  - name: medium
    spec:
      image: ghcr.io/chris-cullins/swe-platform/env-base:latest
      size: medium
      idleTimeout: 15m
      diskSize: 40Gi
