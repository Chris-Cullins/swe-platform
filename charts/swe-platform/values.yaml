replicaCount: 1

image:
  repository: ghcr.io/chris-cullins/swe-platform/operator
  tag: latest
  pullPolicy: IfNotPresent

controlPlane:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/chris-cullins/swe-platform/control-plane
    tag: latest
    pullPolicy: IfNotPresent
  auth:
    tokenAudience: swe-platform
    # Honor X-Forwarded-Host/Proto for WebSocket origin checks only when a trusted
    # reverse proxy overwrites both headers.
    trustProxyHeaders: false
    # Optional all-access bootstrap credential for initial self-hosted setup.
    # Create this Secret out of band and disable/remove it after configuring RBAC.
    bootstrapTokenSecret:
      name: ""
      key: token
  resources: {}

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

leaderElection: true
metricsBindAddress: ":8080"
healthProbeBindAddress: ":8081"

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: true
  runAsNonRoot: true

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}

# EnvironmentTemplate resources to create. Each entry may set `namespace` and
# otherwise uses the release namespace. Empty by default because no stable
# public environment image is published yet.
environmentTemplates: []
