---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: runs.swe.dev
spec:
  group: swe.dev
  names:
    kind: Run
    listKind: RunList
    plural: runs
    singular: run
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .spec.agent
      name: Agent
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Run is one agent task executing in an environment.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              RunSpec defines one agent task executing in an environment.
              A Run either claims environmentRef or asks the controller to allocate an
              Environment from templateRef/projectRef.
            properties:
              agent:
                description: Agent names the agent adapter to use (e.g. claude-code,
                  aider).
                type: string
              cancel:
                description: Cancel requests idempotent cancellation. It cannot be
                  unset.
                type: boolean
              environmentRef:
                description: |-
                  EnvironmentRef claims an existing Environment. Claimed Environments are
                  released, not deleted, when the Run terminates.
                minLength: 1
                type: string
              notify:
                description: |-
                  Notify lists inboxes (run names, or "parent") that receive lifecycle
                  events when this run reaches a terminal state.
                items:
                  type: string
                type: array
                x-kubernetes-list-type: set
              parentRef:
                description: ParentRef links this run to the run that spawned it,
                  if any.
                type: string
              projectRef:
                description: |-
                  ProjectRef configures a controller-allocated Environment and supplies its
                  default template when templateRef is empty.
                minLength: 1
                type: string
              prompt:
                description: Prompt is the task handed to the agent.
                type: string
              templateRef:
                description: TemplateRef selects the template for a controller-allocated
                  Environment.
                minLength: 1
                type: string
            required:
            - agent
            - prompt
            type: object
            x-kubernetes-validations:
            - message: set environmentRef or templateRef/projectRef, not both
              rule: 'has(self.environmentRef) ? (!has(self.templateRef) && !has(self.projectRef))
                : (has(self.templateRef) || has(self.projectRef))'
            - message: agent, prompt, and environment selection are immutable
              rule: self.agent == oldSelf.agent && self.prompt == oldSelf.prompt &&
                ((!has(self.environmentRef) && !has(oldSelf.environmentRef)) || (has(self.environmentRef)
                && has(oldSelf.environmentRef) && self.environmentRef == oldSelf.environmentRef))
                && ((!has(self.projectRef) && !has(oldSelf.projectRef)) || (has(self.projectRef)
                && has(oldSelf.projectRef) && self.projectRef == oldSelf.projectRef))
                && ((!has(self.templateRef) && !has(oldSelf.templateRef)) || (has(self.templateRef)
                && has(oldSelf.templateRef) && self.templateRef == oldSelf.templateRef))
            - message: cancel cannot be unset
              rule: '!has(oldSelf.cancel) || !oldSelf.cancel || (has(self.cancel)
                && self.cancel)'
          status:
            description: RunStatus defines the observed state of Run.
            properties:
              branch:
                description: Branch is the git branch holding the run's changes, once
                  pushed.
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              environmentRef:
                description: EnvironmentRef is the exact owned or claimed Environment
                  incarnation.
                properties:
                  name:
                    type: string
                  ownership:
                    description: EnvironmentOwnership determines terminal and deletion
                      cleanup.
                    enum:
                    - Owned
                    - Claimed
                    type: string
                  uid:
                    description: |-
                      UID is a type that holds unique ID values, including UUIDs.  Because we
                      don't ONLY use UUIDs, this is an alias to string.  Being a type captures
                      intent and helps make sure that UIDs and names do not get conflated.
                    type: string
                required:
                - name
                - ownership
                - uid
                type: object
              observedGeneration:
                description: ObservedGeneration is the Run generation reflected by
                  this status.
                format: int64
                type: integer
              state:
                description: RunState describes where a Run is in its lifecycle.
                enum:
                - Allocating
                - EnvironmentReady
                - AdapterAccepted
                - Running
                - NeedsInput
                - Paused
                - Succeeded
                - Failed
                - Cancelled
                type: string
              transcriptRef:
                description: TranscriptRef points at the stored transcript (adapter-owned
                  format).
                type: string
              usage:
                description: RunUsage records consumption attributable to a run.
                properties:
                  cpuSeconds:
                    format: int64
                    type: integer
                  tokensIn:
                    format: int64
                    type: integer
                  tokensOut:
                    format: int64
                    type: integer
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
