---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: environments.swe.dev
spec:
  group: swe.dev
  names:
    kind: Environment
    listKind: EnvironmentList
    plural: environments
    singular: environment
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.templateRef
      name: Template
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Environment is one ephemeral machine an agent works in.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: EnvironmentSpec defines the desired state of Environment.
            properties:
              backend:
                description: |-
                  Backend overrides the template's backend when set. Only pod is currently
                  supported.
                enum:
                - pod
                type: string
              lifecycle:
                description: Lifecycle contains explicit hold policy and bounded lifecycle
                  requests.
                properties:
                  activity:
                    description: |-
                      Activity contains legacy source-keyed activity requests. New activity
                      publishers use bounded metadata slots so heartbeats do not advance the
                      Environment generation; the lifecycle controller consumes both forms.
                    items:
                      description: EnvironmentActivityRequest is one source's latest
                        activity intent.
                      properties:
                        environmentUID:
                          description: EnvironmentUID is the exact Environment incarnation
                            targeted.
                          type: string
                        holdPolicyRevision:
                          description: HoldPolicyRevision is the policy revision observed
                            by the requester.
                          format: int64
                          minimum: 0
                          type: integer
                        id:
                          description: ID is chosen by the requester and is its idempotency
                            key.
                          maxLength: 128
                          minLength: 1
                          type: string
                        source:
                          description: |-
                            EnvironmentActivitySource identifies an independently updated activity
                            slot. One latest request per source keeps the API bounded.
                          enum:
                          - Terminal
                          - Portal
                          - Inbox
                          - Agent
                          - Run
                          type: string
                      required:
                      - environmentUID
                      - holdPolicyRevision
                      - id
                      - source
                      type: object
                      x-kubernetes-validations:
                      - message: environmentUID must not be empty
                        rule: size(self.environmentUID) > 0
                    maxItems: 5
                    type: array
                    x-kubernetes-list-map-keys:
                    - source
                    x-kubernetes-list-type: map
                  hold:
                    description: Hold is explicit policy and is never cleared by ordinary
                      wake traffic.
                    properties:
                      enabled:
                        type: boolean
                      revision:
                        format: int64
                        minimum: 1
                        type: integer
                    required:
                    - enabled
                    - revision
                    type: object
                    x-kubernetes-validations:
                    - message: revision must increase when hold policy changes
                      rule: self == oldSelf || self.revision > oldSelf.revision
                  suspend:
                    description: |-
                      Suspend requests a backend fence without creating an explicit hold. Run
                      cleanup uses this to preserve a workspace after accepted work stops.
                    properties:
                      environmentUID:
                        description: EnvironmentUID is the exact Environment incarnation
                          targeted.
                        type: string
                      holdPolicyRevision:
                        description: HoldPolicyRevision is the policy revision observed
                          by the requester.
                        format: int64
                        minimum: 0
                        type: integer
                      id:
                        description: ID is chosen by the requester and is its idempotency
                          key.
                        maxLength: 128
                        minLength: 1
                        type: string
                    required:
                    - environmentUID
                    - holdPolicyRevision
                    - id
                    type: object
                    x-kubernetes-validations:
                    - message: environmentUID must not be empty
                      rule: size(self.environmentUID) > 0
                  wake:
                    description: Wake is the requester's latest ordinary wake intent.
                    properties:
                      environmentUID:
                        description: EnvironmentUID is the exact Environment incarnation
                          targeted.
                        type: string
                      expectedSuspensionReason:
                        description: |-
                          ExpectedSuspensionReason limits the transition this request may release.
                          Empty requests written before scoped wake intents were introduced are
                          interpreted as Idle so migration remains fail-closed for cleanup fences.
                        enum:
                        - Hold
                        - Idle
                        - Requested
                        type: string
                      holdPolicyRevision:
                        description: HoldPolicyRevision is the policy revision observed
                          by the requester.
                        format: int64
                        minimum: 0
                        type: integer
                      id:
                        description: ID is chosen by the requester and is its idempotency
                          key.
                        maxLength: 128
                        minLength: 1
                        type: string
                    required:
                    - environmentUID
                    - holdPolicyRevision
                    - id
                    type: object
                    x-kubernetes-validations:
                    - message: environmentUID must not be empty
                      rule: size(self.environmentUID) > 0
                type: object
                x-kubernetes-validations:
                - message: hold policy cannot be removed; disable it at a higher revision
                  rule: '!has(oldSelf.hold) || has(self.hold)'
              paused:
                description: |-
                  Paused is a deprecated compatibility input. The lifecycle controller
                  migrates true to an explicit hold and clears it. New clients must
                  use Lifecycle.Hold or lifecycle requests.
                type: boolean
              projectRef:
                description: ProjectRef is the name of the Project this environment
                  belongs to.
                type: string
              templateRef:
                description: TemplateRef is the name of the EnvironmentTemplate to
                  build from.
                minLength: 1
                type: string
            required:
            - templateRef
            type: object
            x-kubernetes-validations:
            - message: hold policy cannot be removed; disable it at a higher revision
              rule: '!has(oldSelf.lifecycle) || !has(oldSelf.lifecycle.hold) || (has(self.lifecycle)
                && has(self.lifecycle.hold))'
          status:
            description: EnvironmentStatus defines the observed state of Environment.
            properties:
              claimedBy:
                description: |-
                  ClaimedBy is the Run currently using a reusable Environment. Controller-
                  owned Environments do not use claims. Name and UID fence stale Runs.
                properties:
                  name:
                    type: string
                  uid:
                    description: |-
                      UID is a type that holds unique ID values, including UUIDs.  Because we
                      don't ONLY use UUIDs, this is an alias to string.  Being a type captures
                      intent and helps make sure that UIDs and names do not get conflated.
                    type: string
                required:
                - name
                - uid
                type: object
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              endpoints:
                description: EnvironmentEndpoints exposes how to reach services inside
                  the environment.
                properties:
                  sandboxd:
                    description: Sandboxd is the address of the environment's sandboxd
                      gRPC API.
                    type: string
                  terminal:
                    description: Terminal is the websocket address of the shared terminal.
                    type: string
                type: object
              imageID:
                description: |-
                  ImageID is the immutable runtime image identity reported for the current
                  environment container. It is cleared when no backing pod exists.
                type: string
              lastActiveAt:
                description: |-
                  LastActiveAt records the last time the environment saw user or agent activity.
                  The idle reaper uses it to decide when to pause.
                format: date-time
                type: string
              lifecycle:
                description: Lifecycle is observed state owned by the lifecycle controller.
                properties:
                  activityReceipts:
                    description: ActivityReceipts makes activity consumption idempotent
                      and bounded.
                    items:
                      description: EnvironmentActivityReceipt records the latest request
                        consumed for a source.
                      properties:
                        requestID:
                          type: string
                        source:
                          description: |-
                            EnvironmentActivitySource identifies an independently updated activity
                            slot. One latest request per source keeps the API bounded.
                          enum:
                          - Terminal
                          - Portal
                          - Inbox
                          - Agent
                          - Run
                          type: string
                      required:
                      - requestID
                      - source
                      type: object
                    maxItems: 5
                    type: array
                    x-kubernetes-list-map-keys:
                    - source
                    x-kubernetes-list-type: map
                  epoch:
                    description: |-
                      Epoch increases before each transition into suspension. Backends and
                      endpoints from an older epoch are fenced.
                    format: int64
                    minimum: 0
                    type: integer
                  lastSuspendRequestID:
                    description: |-
                      LastSuspendRequestID is the latest suspension request accepted. It keeps
                      replay of an acknowledged request idempotent after a later wake.
                    type: string
                  lastWakeRequestID:
                    description: |-
                      LastWakeRequestID is the latest valid wake consumed, including a wake
                      refused because an explicit hold was enabled.
                    type: string
                  observedHoldPolicyRevision:
                    description: ObservedHoldPolicyRevision is the revision used for
                      this decision.
                    format: int64
                    type: integer
                  pendingSuspendRequestID:
                    description: |-
                      PendingSuspendRequestID identifies the accepted request whose backend
                      teardown has not yet been acknowledged. It remains authoritative across
                      later hold-policy revisions.
                    type: string
                  suspended:
                    description: Suspended is the controller's decision that backend
                      execution must be absent.
                    type: boolean
                  suspensionReason:
                    description: SuspensionReason explains the current suspension.
                    enum:
                    - Hold
                    - Idle
                    - Requested
                    type: string
                  suspensionRequestID:
                    description: SuspensionRequestID identifies the request that caused
                      Requested suspension.
                    type: string
                type: object
              observedGeneration:
                description: ObservedGeneration is the Environment generation reflected
                  by this status.
                format: int64
                type: integer
              phase:
                description: EnvironmentPhase describes where an Environment is in
                  its lifecycle.
                enum:
                - Creating
                - Setup
                - Ready
                - Running
                - Idle
                - Paused
                - Resuming
                - Failed
                - Terminated
                type: string
              podName:
                description: PodName is the name of the backing pod, when one exists.
                type: string
              podRecoveryAttempts:
                description: |-
                  PodRecoveryAttempts is the number of terminal Pod replacements attempted
                  since the current Pod recovery sequence last became ready.
                format: int32
                type: integer
              podRecoveryExhausted:
                description: |-
                  PodRecoveryExhausted reports that automatic terminal Pod replacement has
                  consumed its retry budget. It remains set until sandboxd becomes ready.
                type: boolean
              podRecoveryNextAttemptAt:
                description: |-
                  PodRecoveryNextAttemptAt is when the controller may next replace a
                  terminal Pod.
                format: date-time
                type: string
              podRecoveryUID:
                description: |-
                  PodRecoveryUID identifies the exact terminal Pod covered by the pending or
                  in-progress recovery attempt.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
