{{- if .Values.controlPlane.enabled }}
{{- if ne (int .Values.controlPlane.replicaCount) 1 }}
{{- fail "controlPlane.replicaCount must be 1 while the process-local transcript store is enabled" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "swe-platform.controlPlaneFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "swe-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  replicas: {{ .Values.controlPlane.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "swe-platform.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "swe-platform.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: control-plane
    spec:
      serviceAccountName: {{ include "swe-platform.controlPlaneFullname" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: control-plane
          image: "{{ .Values.controlPlane.image.repository }}:{{ .Values.controlPlane.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.controlPlane.image.pullPolicy }}
          args: ["--listen-address=:8080"]
          env:
            - name: SWE_TOKEN_AUDIENCE
              value: {{ .Values.controlPlane.auth.tokenAudience | quote }}
            - name: SWE_TRUST_PROXY_HEADERS
              value: {{ .Values.controlPlane.auth.trustProxyHeaders | quote }}
            - name: SWE_ALLOW_INSECURE_SESSIONS
              value: {{ .Values.controlPlane.auth.allowInsecureSessions | quote }}
            {{- with .Values.controlPlane.auth.bootstrapTokenSecret.name }}
            - name: SWE_BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ . | quote }}
                  key: {{ $.Values.controlPlane.auth.bootstrapTokenSecret.key | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet: {path: /healthz, port: http}
          readinessProbe:
            httpGet: {path: /healthz, port: http}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.controlPlane.resources | nindent 12 }}
{{- end }}
