image:
  repository: ghcr.io/chris-cullins/swe-platform/operator
  tag: dev
  pullPolicy: IfNotPresent

controlPlane:
  image:
    tag: dev
  auth:
    allowInsecureSessions: true
  # Keep CPU headroom for the claimed environment and its immediate warm-pool
  # replacement on kind's single control-plane node.
  resources:
    requests:
      cpu: 10m

leaderElection: false

environmentTemplates:
  - name: small
    spec:
      image: ghcr.io/chris-cullins/swe-platform/env-base:dev
      # Leave room for the claimed environment and its immediate pool replacement
      # on kind's single control-plane node.
      size: tiny
      idleTimeout: 15m
      diskSize: 5Gi
      warmPool:
        min: 1
