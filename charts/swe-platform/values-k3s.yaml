# Production baseline for k3s. k3s does not include gVisor, so this preset uses
# the cluster's default OCI runtime for environment pods.
image:
  tag: latest

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

environmentTemplates:
  - name: medium
    spec:
      image: ghcr.io/chris-cullins/swe-platform/env-base:latest
      size: medium
      idleTimeout: 15m
      diskSize: 40Gi
