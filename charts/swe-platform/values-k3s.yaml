# Production baseline for k3s. Images inherit the chart appVersion as one
# coordinated release. k3s does not include gVisor, so this preset uses the
# cluster's default OCI runtime for environment pods.

controlPlane:
  transcripts:
    postgresSecret:
      # Create this Secret out of band before installing the production preset.
      name: swe-platform-postgres

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

environmentTemplates:
  - name: medium
    spec:
      size: medium
      idleTimeout: 15m
      diskSize: 40Gi
