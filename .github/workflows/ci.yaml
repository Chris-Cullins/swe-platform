name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  operations-console:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.18.0"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Verify bundled npm
        run: test "$(npm --version)" = "11.16.0"
      - name: Install and check operations console
        working-directory: ui
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm test -- --run
          npm run build
          npm audit
      - name: Test production asset embedding
        run: |
          make check-ui-assets
          go test -tags console ./internal/controlplane ./ui
          make build-control-plane-production

      - name: Build production control-plane image
        run: make docker-build-control-plane

  sandboxd-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: sandboxd/go.sum
      - name: Test Windows process containment and portable filesystem
        working-directory: sandboxd
        run: go test ./internal/server -run "^(TestProcessDomainAssignsLeaderToJob|TestProcessServiceForceContainsDescendant|TestExecExplicitAndCloseSendEOFStillPublishOutputAndExit|TestFilesystem.*)$" -count=1

  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: swe_platform_test
          POSTGRES_PASSWORD: test-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d swe_platform_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      SWE_TEST_POSTGRES_URL: postgres://postgres:test-only-password@localhost:5432/swe_platform_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - uses: azure/setup-helm@v4

      - name: Build root module (operator + CLI)
        run: go build ./...

      - name: Vet root module
        run: go vet ./...

      - name: Test root module
        run: go test ./...

      - name: Build sandboxd
        working-directory: sandboxd
        run: go build ./...

      - name: Vet sandboxd
        working-directory: sandboxd
        run: go vet ./...

      - name: Test sandboxd
        working-directory: sandboxd
        run: go test ./...

      - name: Generated code is current
        run: |
          make generate manifests
          git diff --exit-code -- api config charts/swe-platform/crds

      - name: Validate Helm chart
        run: |
          helm lint charts/swe-platform
          for preset in kind argocd k3s gke eks; do
            values="charts/swe-platform/values-${preset}.yaml"
            helm lint charts/swe-platform --values "$values"
            helm template swe-platform charts/swe-platform \
              --namespace swe-platform-system --values "$values" >/dev/null
          done
          rendered=$(helm template swe-platform charts/swe-platform \
            --namespace swe-platform-system \
            --set controlPlane.transcripts.postgresSecret.name=test-postgres)
          printf '%s\n' "$rendered" | grep -A5 'name: SWE_POSTGRES_URL' | grep -q 'name: "test-postgres"'

      - name: Production images are immutable and coordinated
        run: |
          app_version=$(awk '$1 == "appVersion:" {gsub(/"/, "", $2); print $2}' charts/swe-platform/Chart.yaml)
          if [[ ! "$app_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Chart.appVersion must be an immutable release version, got: ${app_version:-<empty>}" >&2
            exit 1
          fi
          for preset in k3s gke eks; do
            images=$(helm template swe-platform charts/swe-platform \
              --namespace swe-platform-system \
              --values "charts/swe-platform/values-${preset}.yaml" |
              awk '$1 == "image:" {gsub(/"/, "", $2); print $2}')
            test "$(printf '%s\n' "$images" | wc -l)" -eq 3
            test "$(printf '%s\n' "$images" | sort -u | sed -n "s/.*:\([^:@]*\)$/\1/p" | uniq)" = "$app_version"
            if printf '%s\n' "$images" | grep -Eq ':(latest|dev)$'; then
              echo "mutable production image in values-${preset}.yaml" >&2
              exit 1
            fi
          done
