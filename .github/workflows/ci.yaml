name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - uses: azure/setup-helm@v4

      - name: Build root module (operator + CLI)
        run: go build ./...

      - name: Vet root module
        run: go vet ./...

      - name: Test root module
        run: go test ./...

      - name: Build sandboxd
        working-directory: sandboxd
        run: go build ./...

      - name: Vet sandboxd
        working-directory: sandboxd
        run: go vet ./...

      - name: Test sandboxd
        working-directory: sandboxd
        run: go test ./...

      - name: Generated code is current
        run: |
          make generate manifests
          git diff --exit-code -- api config charts/swe-platform/crds

      - name: Validate Helm chart
        run: |
          helm lint charts/swe-platform
          helm lint charts/swe-platform --values charts/swe-platform/values-kind.yaml
          helm template swe-platform charts/swe-platform --namespace default --values charts/swe-platform/values-kind.yaml >/dev/null
