name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build root module (operator + CLI)
        run: go build ./...

      - name: Vet root module
        run: go vet ./...

      - name: Test root module
        run: go test ./...

      - name: Build sandboxd
        working-directory: sandboxd
        run: go build ./...

      - name: Vet sandboxd
        working-directory: sandboxd
        run: go vet ./...

      - name: Test sandboxd
        working-directory: sandboxd
        run: go test ./...

      - name: Generated code is current
        run: |
          make generate manifests
          git diff --exit-code -- api config
