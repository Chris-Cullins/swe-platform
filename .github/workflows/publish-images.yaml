name: publish-images

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: operator
            dockerfile: images/operator/Dockerfile
          - name: control-plane
            dockerfile: images/control-plane/Dockerfile
          - name: env-base
            dockerfile: images/env-base/Dockerfile
    steps:
      - uses: actions/checkout@v7

      - name: Validate release version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          app_version=$(awk '$1 == "appVersion:" {gsub(/"/, "", $2); print $2}' charts/swe-platform/Chart.yaml)
          if [[ "$GITHUB_REF_NAME" != "v${app_version}" ]]; then
            echo "release tag ${GITHUB_REF_NAME} does not match Chart.appVersion ${app_version}" >&2
            exit 1
          fi

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image prefix
        id: image
        run: echo "prefix=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.prefix }}/${{ matrix.image.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

      - name: Record published digest
        env:
          IMAGE_NAME: ${{ matrix.image.name }}
          IMAGE_REPOSITORY: ${{ steps.image.outputs.prefix }}/${{ matrix.image.name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p image-digest
          jq -n \
            --arg name "$IMAGE_NAME" \
            --arg repository "$IMAGE_REPOSITORY" \
            --arg digest "$IMAGE_DIGEST" \
            '{name: $name, repository: $repository, digest: $digest}' \
            > "image-digest/${IMAGE_NAME}.json"

      - uses: actions/upload-artifact@v4
        with:
          name: image-digest-${{ matrix.image.name }}
          path: image-digest/${{ matrix.image.name }}.json

  release-manifest:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v4
        with:
          pattern: image-digest-*
          path: image-digests
          merge-multiple: true

      - name: Create release manifest
        run: |
          chart_version=$(awk '$1 == "version:" {print $2}' charts/swe-platform/Chart.yaml)
          app_version=$(awk '$1 == "appVersion:" {gsub(/"/, "", $2); print $2}' charts/swe-platform/Chart.yaml)
          jq -s \
            --arg chartVersion "$chart_version" \
            --arg appVersion "$app_version" \
            '{chartVersion: $chartVersion, appVersion: $appVersion, images: (map({key: .name, value: {repository: .repository, digest: .digest}}) | from_entries)}' \
            image-digests/*.json > release-manifest.json
          cat release-manifest.json >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: swe-platform-release-${{ github.ref_name }}-${{ github.sha }}
          path: release-manifest.json
